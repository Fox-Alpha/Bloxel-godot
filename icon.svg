    <rect x="250" y="476" width="98" height="98" rx="10" fill="#00f0f0" stroke="#009999" stroke-width="2"/>
    <rect x="258" y="480" width="82" height="12" rx="3" fill="#66ffff" opacity="0.6"/>
    <rect x="258" y="558" width="82" height="8" rx="2" fill="#009999" opacity="0.4"/>

