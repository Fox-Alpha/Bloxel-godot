    <rect x="684" y="480" width="82" height="12" rx="3" fill="#ff6666" opacity="0.6"/>
    <rect x="684" y="558" width="82" height="8" rx="2" fill="#990000" opacity="0.4"/>
  </g>

  <!-- Tetris blocks stacked below the head (T-piece) -->
  <g>
    <rect x="44" y="96" width="10" height="10" rx="2" fill="#e94560" stroke="#cc0044" stroke-width="0.8"/>
    <rect x="44.5" y="96.5" width="5" height="2" rx="0.8" fill="#ff6680" opacity="0.6"/>

    <rect x="54" y="96" width="10" height="10" rx="2" fill="#e94560" stroke="#cc0044" stroke-width="0.8"/>
