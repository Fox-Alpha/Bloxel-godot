    <rect x="68.5" y="6.5" width="5" height="2" rx="0.8" fill="#66ffff" opacity="0.6"/>

    <rect x="54" y="16" width="10" height="10" rx="2" fill="#00f0f0" stroke="#009999" stroke-width="0.8"/>
    <rect x="54.5" y="16.5" width="5" height="2" rx="0.8" fill="#66ffff" opacity="0.6"/>

    <rect x="68" y="26" width="10" height="10" rx="2" fill="#00f0f0" stroke="#009999" stroke-width="0.8"/>
    <rect x="68.5" y="26.5" width="5" height="2" rx="0.8" fill="#66ffff" opacity="0.6"/>

    <rect x="40" y="36" width="10" height="10" rx="2" fill="#00f0f0" stroke="#009999" stroke-width="0.8"/>
    <rect x="40.5" y="36.5" width="5" height="2" rx="0.8" fill="#66ffff" opacity="0.6"/>

