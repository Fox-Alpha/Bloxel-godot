    <rect x="24.5" y="40.5" width="5" height="2" rx="0.8" fill="#ffcc66" opacity="0.6"/>

    <rect x="34" y="40" width="10" height="10" rx="2" fill="#f0a000" stroke="#996600" stroke-width="0.8"/>
    <rect x="34.5" y="40.5" width="5" height="2" rx="0.8" fill="#ffcc66" opacity="0.6"/>
