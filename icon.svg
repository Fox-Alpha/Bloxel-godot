  <!-- Ghost grid lines in the visor area -->
  <g transform="translate(28 60.5)" opacity="0.15" fill="none" stroke="#fff" stroke-width="0.4">
    <line x1="0" y1="5" x2="72" y2="5"/>
    <line x1="0" y1="10" x2="72" y2="10"/>
    <line x1="0" y1="15" x2="72" y2="15"/>
    <line x1="18" y1="0" x2="18" y2="20"/>
    <line x1="36" y1="0" x2="36" y2="20"/>
    <line x1="54" y1="0" x2="54" y2="20"/>
